---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: open-webui-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "postgresql://{{ .OPENWEBUI_DB_USER }}:{{ .OPENWEBUI_DB_PASS }}@postgres-rw.database.svc.cluster.local:5432/openwebui"
        PGVECTOR_DB_URL: "postgresql://{{ .OPENWEBUI_RAG_DB_USER }}:{{ .OPENWEBUI_RAG_DB_PASS }}@postgres-rw.database.svc.cluster.local:5432/openwebuirag"
        WEBUI_SECRET_KEY: "{{ .OPENWEBUI_SECRET_KEY }}"
        OPENAI_API_KEY: "{{ .OPENROUTER_OPENWEBUI_API_KEY }}"
        OAUTH_CLIENT_ID: "{{ .OPENWEBUI_OIDC_CLIENT_ID }}"
        OAUTH_CLIENT_SECRET: "{{ .OPENWEBUI_OIDC_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: openwebui
    - extract:
        key: openrouter
