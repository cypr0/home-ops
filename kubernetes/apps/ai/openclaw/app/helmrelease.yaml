---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openclaw
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    workload:
      replicaCount: 1
      strategy: Recreate
      podAnnotations:
        reloader.stakater.com/auto: "true"
        secret.reloader.stakater.com/reload: "openclaw-secret"
      podSecurityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    serviceAccount:
      create: true
      automount: true
      name: openclaw-reader

    gateway:
      service:
        type: ClusterIP
        port: 18789
        sandboxPort: 8080
      trustedProxies:
        - "10.69.0.0/16"
        - "127.0.0.1/32"
        - "::1/128"
      controlUi:
        allowInsecureAuth: true
        # if allowedOrigins is missing or expands to an empty/invalid value,
        # the gateway refuses to start; enabling the host-header fallback
        # avoids the failure while you sort out a proper origin list.
        dangerouslyAllowHostHeaderOriginFallback: true
        dangerouslyDisableDeviceAuth: false
        # required when Control UI is exposed to non-loopback network
        # replace with your actual allowed origin(s) or keep fallback true
        allowedOrigins:
          - "https://claw.${SECRET_DOMAIN}"
    openclaw:
      image:
        repository: ghcr.io/openclaw/openclaw
        tag: "2026.3.2"
        pullPolicy: IfNotPresent
      secrets:
        apiKey:
          existingSecret: openclaw-secret
          key: OPENROUTER_API_KEY
          create: false
      config:
        mode: merge
        plugins:
          allow:
            - openclaw-mcp-adapter
        channels:
          - id: telegram
            provider: telegram
            config:
              botToken: "${TELEGRAM_BOT_TOKEN}"
              webhookPath: /webhooks/telegram
        modelProvider:
          provider: openrouter
          api: openai-completions
          baseUrl: https://openrouter.ai/api/v1
          model: anthropic/claude-opus-4.6
          models:
            - id: anthropic/claude-opus-4.6
              name: Claude Opus 4.6
            - id: anthropic/claude-opus-4.1
              name: Claude Opus 4.1
            - id: anthropic/claude-sonnet-4.5
              name: Claude Sonnet 4.5
            - id: openai/gpt-5.2-chat
              name: GPT-5.2 Chat
            - id: mistralai/mistral-large-2512
              name: Mistral Large
          extra: {}
        tools:
          execHost: gateway
      plugins:
        runtimeEntries:
          - id: openclaw-mcp-adapter
            enabled: true
            config:
              servers:
                - name: sandbox
                  transport: http
                  url: http://127.0.0.1:8080/mcp
              toolPrefix: true
      bootstrap:
        mode: online
        seedImage:
          repository: ghcr.io/weak-fox/openclaw-offline-seed
          tag: "v1.0.0-oc-2026.3.2"
          pullPolicy: IfNotPresent
        skills:
          enabled: true
          items:
            - weather
        plugins:
          enabled: true
          items:
            - id: openclaw-mcp-adapter
              onlineSpec: openclaw-mcp-adapter
              offlineMode: preinstalled
      container:
        command:
          - node
          - dist/index.js
        args:
          - gateway
          - --bind
          - lan
          - --port
          - "18789"
        env:
          TZ: ${TIMEZONE}
          NODE_OPTIONS: --max-old-space-size=2048
        envFrom:
          - secretRef:
              name: openclaw-secret
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 3Gi
        probes:
          startup:
            enabled: true
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          readiness:
            enabled: true
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          liveness:
            enabled: true
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

    sandbox:
      enabled: true
      workspaceMountPath: /openclaw-workspace
      shmMountPath: /dev/shm
      image:
        repository: ghcr.io/agent-infra/sandbox
        tag: "1.0.0.152"
        pullPolicy: IfNotPresent
      env:
        TZ: ${TIMEZONE}
        DISPLAY_WIDTH: "1280"
        DISPLAY_HEIGHT: "1024"
        BROWSER_EXTRA_ARGS: "--disable-dev-shm-usage"
      securityContext:
        seccompProfile:
          type: Unconfined
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi

    storage:
      config:
        enabled: true
      data:
        enabled: true
        existingClaim: openclaw-pvc
      tmp:
        enabled: true
      sharedMemory:
        enabled: true
        sizeLimit: 2Gi

    ingress:
      enabled: false

    networkPolicy:
      enabled: false
