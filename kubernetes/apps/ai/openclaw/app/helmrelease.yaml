---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openclaw
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      openclaw:
        replicas: 1
        strategy: Recreate
        serviceAccount:
          name: openclaw-reader
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: "openclaw-secret"
        initContainers:
          copy-agent-config:
            image:
              repository: alpine
              tag: latest
            command:
              - /bin/sh
              - -ec
              - |
                mkdir -p /data/workspace/cluster-monitor
                cp -v /config/agents/cluster-monitor/* /data/workspace/cluster-monitor/
                ls -la /data/workspace/cluster-monitor/
            volumeMounts:
              - name: agent-config
                mountPath: /config/agents/cluster-monitor
              - name: data
                mountPath: /data
                subPath: data
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.2.26
            command:
              - /bin/sh
              - -ec
              - |
                AUTO_APPROVE_CIDRS="192.168.30.0/24,10.69.0.0/16"

                node openclaw.mjs config set gateway.auth.mode token
                node openclaw.mjs config set gateway.auth.token "$OPENCLAW_GATEWAY_TOKEN"
                node openclaw.mjs config set gateway.remote.token "$OPENCLAW_GATEWAY_TOKEN"
                node openclaw.mjs config set gateway.trustedProxies '["10.69.0.0/16","127.0.0.1/32","::1/128"]' --strict-json
                node openclaw.mjs config set gateway.controlUi.allowedOrigins '["https://claw.${SECRET_DOMAIN}"]' --strict-json
                node openclaw.mjs config set agents.defaults.models '{"openrouter/openai/gpt-5.2-chat":{"alias":"gpt"},"openrouter/anthropic/claude-opus-4.1":{"alias":"opus"},"openrouter/anthropic/claude-sonnet-4.5":{"alias":"sonnet"},"openrouter/mistralai/mistral-large-2512":{"alias":"mistral"}}' --strict-json
                node openclaw.mjs config set agents.defaults.model.primary "openrouter/openai/gpt-5.2-chat"
                node openclaw.mjs config set agents.defaults.model.fallbacks '["openrouter/anthropic/claude-opus-4.1","openrouter/mistralai/mistral-large-2512","openrouter/anthropic/claude-sonnet-4.5"]' --strict-json

                # Single cluster-monitor agent
                node openclaw.mjs config set agents.list '[{"id":"cluster-monitor","default":true,"name":"Cluster Monitor","workspace":"/data/workspace/cluster-monitor","model":"openrouter/openai/gpt-5.2-chat"}]' --strict-json

                node openclaw.mjs gateway --allow-unconfigured --bind lan --port 18789 &
                gateway_pid=$!

                (
                  while kill -0 "$gateway_pid" 2>/dev/null; do
                    out="$(node openclaw.mjs devices list 2>/dev/null || true)"
                    reqs="$(printf '%s\n' "$out" | awk -v cidrs="$AUTO_APPROVE_CIDRS" '
                      function ip2int(ip, a, i, n, v) {
                        n = split(ip, a, ".")
                        if (n != 4) return -1
                        v = 0
                        for (i = 1; i <= 4; i++) {
                          if (a[i] !~ /^[0-9]+$/) return -1
                          if ((a[i] + 0) < 0 || (a[i] + 0) > 255) return -1
                          v = v * 256 + (a[i] + 0)
                        }
                        return v
                      }
                      function ip_in_cidr(ip, cidr, p, net, prefix, ipi, neti, block) {
                        split(cidr, p, "/")
                        net = p[1]
                        prefix = p[2] + 0
                        if (prefix < 0 || prefix > 32) return 0
                        ipi = ip2int(ip)
                        neti = ip2int(net)
                        if (ipi < 0 || neti < 0) return 0
                        if (prefix == 32) return ipi == neti
                        if (prefix == 0) return 1
                        block = 2 ^ (32 - prefix)
                        return int(ipi / block) == int(neti / block)
                      }
                      function is_allowed(ip, list, arr, n, i, c) {
                        n = split(list, arr, ",")
                        for (i = 1; i <= n; i++) {
                          c = arr[i]
                          gsub(/^[ \t]+|[ \t]+$/, "", c)
                          if (c != "" && ip_in_cidr(ip, c)) return 1
                        }
                        return 0
                      }
                      {
                        if (match($0, /[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/)) {
                          current = substr($0, RSTART, RLENGTH)
                        }
                        if (match($0, /([0-9]{1,3}\.){3}[0-9]{1,3}/)) {
                          ip = substr($0, RSTART, RLENGTH)
                          if (current != "" && is_allowed(ip, cidrs)) {
                            print current
                          }
                        }
                      }
                    ' | sort -u)"

                    if [ -n "$reqs" ]; then
                      for req in $reqs; do
                        node openclaw.mjs devices approve "$req" >/dev/null 2>&1 || true
                      done
                    fi
                    sleep 10
                  done
                ) &
                approver_pid=$!

                wait "$gateway_pid"
                rc=$?
                kill "$approver_pid" 2>/dev/null || true
                exit "$rc"
            env:
              PORT: &port 18789
              TZ: ${TIMEZONE}
              OPENCLAW_STATE_DIR: /data/.openclaw
              OPENCLAW_WORKSPACE_DIR: /data/workspace
              NODE_OPTIONS: --max-old-space-size=2048
            envFrom:
              - secretRef:
                  name: openclaw-secret
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 3Gi

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - claw.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      data:
        enabled: true
        existingClaim: openclaw-pvc
        advancedMounts:
          openclaw:
            copy-agent-config:
              - path: /data
                subPath: data
            app:
              - path: /data
                subPath: data
      agent-config:
        type: configMap
        name: openclaw-agent-cluster-monitor
        advancedMounts:
          openclaw:
            copy-agent-config:
              - path: /config/agents/cluster-monitor
