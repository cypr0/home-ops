---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openclaw
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    workload:
      replicaCount: 1
      strategy: Recreate
      podAnnotations:
        reloader.stakater.com/auto: "true"
        secret.reloader.stakater.com/reload: "openclaw-secret"
      podSecurityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    serviceAccount:
      create: true
      automount: true
      name: openclaw-reader

    gateway:
      service:
        type: ClusterIP
        port: 18789
        sandboxPort: 8080
      trustedProxies:
        - "10.69.0.0/16"
        - "127.0.0.1/32"
        - "::1/128"
      controlUi:
        allowInsecureAuth: false
        dangerouslyAllowHostHeaderOriginFallback: true
        dangerouslyDisableDeviceAuth: false
        allowedOrigins:
          - "https://claw.${SECRET_DOMAIN}"
    openclaw:
      image:
        repository: ghcr.io/openclaw/openclaw
        tag: "2026.3.2"
        pullPolicy: IfNotPresent
      secrets:
        apiKey:
          existingSecret: openclaw-secret
          key: OPENROUTER_API_KEY
          create: false
      config:
        mode: merge
        plugins:
          allow:
            - openclaw-mcp-adapter
        channels:
          - id: telegram
            provider: telegram
            config:
              botToken: "${TELEGRAM_BOT_TOKEN}"
              webhookPath: /webhooks/telegram

        modelProvider:
          provider: openrouter
          api: openai-completions
          baseUrl: https://openrouter.ai/api/v1
          model: openai/gpt-5.2
          models:
            - id: openai/gpt-5.2
              name: GPT-5.2
            - id: anthropic/claude-opus-4.1
              name: Claude Opus 4.1
            - id: anthropic/claude-sonnet-4.5
              name: Claude Sonnet 4.5
            - id: openai/gpt-5.2-chat
              name: GPT-5.2 Chat
            - id: mistralai/mistral-large-2512
              name: Mistral Large
          extra: {}

        models:
          mode: merge
          providers:
            openai:
              baseUrl: https://api.openai.com/v1
              apiKey: "${OPENAI_API_KEY}"
              api: openai-completions
              models: []

        # Whisper / Speech-to-Text
        tools:
          media:
            audio:
              enabled: true
              maxBytes: 20971520
              models:
                - provider: openai
                  model: gpt-4o-mini-transcribe
          execHost: gateway

        # Text-to-Speech
        messages:
          tts:
            auto: "off"
            provider: openai
            openai:
              model: gpt-4o-mini-tts
              voice: alloy

        # Image Generation
        agents:
          defaults:
            imageModel:
              primary: "openai/gpt-image-1"
      plugins:
        runtimeEntries:
          - id: openclaw-mcp-adapter
            enabled: true
            config:
              servers:
                - name: sandbox
                  transport: http
                  url: http://127.0.0.1:8080/mcp
              toolPrefix: true
      bootstrap:
        mode: online
        seedImage:
          repository: ghcr.io/weak-fox/openclaw-offline-seed
          tag: "v1.0.0-oc-2026.3.2"
          pullPolicy: IfNotPresent
        skills:
          enabled: true
          items:
            - weather
            - openai-image-gen
        plugins:
          enabled: true
          items:
            - id: openclaw-mcp-adapter
              onlineSpec: openclaw-mcp-adapter
              offlineMode: preinstalled
      initContainers:
        - name: install-ffmpeg
          image: mwader/static-ffmpeg:7.1
          command: ["sh", "-c"]
          args:
            - |
              cp /ffmpeg /ffprobe /opt/ffmpeg/
              chmod +x /opt/ffmpeg/ffmpeg /opt/ffmpeg/ffprobe
          volumeMounts:
            - name: ffmpeg
              mountPath: /opt/ffmpeg
      container:
        command:
          - node
          - dist/index.js
        args:
          - gateway
          - --bind
          - lan
          - --port
          - "18789"
        volumeMounts:
          - name: ffmpeg
            mountPath: /opt/ffmpeg
        env:
          TZ: ${TIMEZONE}
          NODE_OPTIONS: --max-old-space-size=2048
          PATH: "/opt/ffmpeg:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        envFrom:
          - secretRef:
              name: openclaw-secret
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 3Gi
        probes:
          startup:
            enabled: true
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          readiness:
            enabled: true
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          liveness:
            enabled: true
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

    sandbox:
      enabled: true
      workspaceMountPath: /openclaw-workspace
      shmMountPath: /dev/shm
      image:
        repository: ghcr.io/agent-infra/sandbox
        tag: "1.0.0.152"
        pullPolicy: IfNotPresent
      env:
        TZ: ${TIMEZONE}
        DISPLAY_WIDTH: "1280"
        DISPLAY_HEIGHT: "1024"
        BROWSER_EXTRA_ARGS: "--disable-dev-shm-usage"
      securityContext:
        seccompProfile:
          type: Unconfined
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi

    storage:
      config:
        enabled: true
      data:
        enabled: true
        existingClaim: openclaw-pvc
      tmp:
        enabled: true
      sharedMemory:
        enabled: true
        sizeLimit: 2Gi
      ffmpeg:
        enabled: true
        type: emptyDir
        sizeLimit: 200Mi

    ingress:
      enabled: false

    networkPolicy:
      enabled: false
