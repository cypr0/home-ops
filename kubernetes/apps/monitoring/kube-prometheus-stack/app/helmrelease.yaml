---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 61.7.2
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    prometheus:
      prometheusSpec:
        retention: 15d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-standard
              resources:
                requests:
                  storage: 20Gi
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
    grafana:
      enabled: true
      persistence:
        enabled: true
        storageClassName: longhorn-basic
        size: 5Gi
      admin:
        existingSecret: monitoring-secret
        userKey: GRAFANA_ADMIN_USER
        passwordKey: GRAFANA_ADMIN_PASSWORD
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
              access: proxy
              isDefault: true
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ""
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      dashboards:
        default:
          kubernetes-cluster:
            gnetId: 7249
            revision: 1
            datasource: Prometheus
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-basic
              resources:
                requests:
                  storage: 2Gi
      config:
        receivers:
          - name: telegram
            telegram_configs:
              - bot_token: ${TELEGRAM_BOT_TOKEN}
                chat_id: ${TELEGRAM_CHAT_ID}
                parse_mode: HTML
        route:
          receiver: telegram
          routes:
            - matchers:
                - severity=~"warning|critical"
              receiver: telegram
    kubeStateMetrics:
      enabled: true
    nodeExporter:
      enabled: true
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
