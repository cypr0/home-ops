---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 61.7.2
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  maxHistory: 2
  install:
    remediation:
      retries: 3
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
    timeout: 10m
  uninstall:
    keepHistory: false
  values:
    prometheus:
      prometheusSpec:
        retention: 15d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-standard
              resources:
                requests:
                  storage: 20Gi
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
    grafana:
      enabled: true
      persistence:
        enabled: true
        storageClassName: longhorn-basic
        size: 5Gi
      admin:
        existingSecret: monitoring-secret
        userKey: GRAFANA_ADMIN_USER
        passwordKey: GRAFANA_ADMIN_PASSWORD
      envFromSecret: monitoring-secret
      grafana.ini:
        server:
          root_url: https://grafana.${SECRET_DOMAIN}
        auth:
          disable_login_form: true
        auth.generic_oauth:
          enabled: true
          name: Authentik
          allow_sign_up: true
          client_id: $__env{GRAFANA_OIDC_CLIENT_ID}
          client_secret: $__env{GRAFANA_OIDC_CLIENT_SECRET}
          scopes: openid email profile groups
          auth_url: https://id.${SECRET_DOMAIN}/application/o/authorize/
          token_url: https://id.${SECRET_DOMAIN}/application/o/token/
          api_url: https://id.${SECRET_DOMAIN}/application/o/userinfo/
          role_attribute_path: "contains(groups, 'admins') && 'Admin' || 'Viewer'"
          groups_attribute_path: groups
          login_attribute_path: preferred_username
          use_pkce: true
          use_refresh_token: true
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              uid: prometheus
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
              access: proxy
              isDefault: true
            - name: Alertmanager
              type: alertmanager
              uid: alertmanager
              url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
              access: proxy
              isDefault: false
              jsonData:
                handleGrafanaManagedAlerts: false
                implementation: prometheus
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ""
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      dashboards:
        default:
          kubernetes-cluster:
            gnetId: 7249
            revision: 1
            datasource: Prometheus
          node-exporter-full:
            gnetId: 1860
            revision: 37
            datasource: Prometheus
          talos:
            gnetId: 20440
            revision: 13
            datasource: Prometheus
          longhorn:
            gnetId: 16888
            revision: 9
            datasource: Prometheus
          cloudnative-pg:
            gnetId: 20417
            revision: 2
            datasource: Prometheus
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-basic
              resources:
                requests:
                  storage: 2Gi
      config:
        receivers:
          - name: telegram
            telegram_configs:
              - bot_token: ${TELEGRAM_BOT_TOKEN}
                chat_id: ${TELEGRAM_CHAT_ID}
                parse_mode: HTML
        route:
          receiver: telegram
          routes:
            - matchers:
                - severity=~"warning|critical"
              receiver: telegram
    kubeStateMetrics:
      enabled: true
    nodeExporter:
      enabled: true
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
