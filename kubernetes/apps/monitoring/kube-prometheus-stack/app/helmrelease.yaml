---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 61.7.2
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  maxHistory: 2
  install:
    remediation:
      retries: 3
    timeout: 15m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
    timeout: 15m
  uninstall:
    keepHistory: false
  values:
    prometheus:
      prometheusSpec:
        retention: 15d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-standard
              resources:
                requests:
                  storage: 20Gi
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
    grafana:
      enabled: true
      persistence:
        enabled: true
        storageClassName: longhorn-basic
        size: 5Gi
      env:
        GF_SERVER_ROOT_URL: https://grafana.${SECRET_DOMAIN}
        GF_AUTH_DISABLE_LOGIN_FORM: "true"
        GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
        GF_AUTH_GENERIC_OAUTH_NAME: Authentik
        GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
        GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile groups"
        GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://id.${SECRET_DOMAIN}/application/o/authorize/"
        GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://id.${SECRET_DOMAIN}/application/o/token/"
        GF_AUTH_GENERIC_OAUTH_API_URL: "https://id.${SECRET_DOMAIN}/application/o/userinfo/"
        GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups, 'admins') && 'Admin' || 'Viewer'"
        GF_AUTH_GENERIC_OAUTH_GROUPS_ATTRIBUTE_PATH: groups
        GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: preferred_username
        GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
        GF_AUTH_GENERIC_OAUTH_USE_REFRESH_TOKEN: "true"
      envFromSecret: monitoring-secret
      datasources: {}
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ""
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      dashboards:
        default:
          kubernetes-cluster:
            gnetId: 7249
            revision: 1
            datasource: Prometheus
          node-exporter-full:
            gnetId: 1860
            revision: 37
            datasource: Prometheus
          longhorn:
            gnetId: 16888
            revision: 9
            datasource: Prometheus
          envoy-overview:
            gnetId: 24459
            revision: 1
            datasource: Prometheus
          envoy-upstream:
            gnetId: 24457
            revision: 1
            datasource: Prometheus
          envoy-downstream:
            gnetId: 24458
            revision: 1
            datasource: Prometheus
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-basic
              resources:
                requests:
                  storage: 2Gi
      config:
        receivers:
          - name: telegram
            telegram_configs:
              - bot_token: ${TELEGRAM_BOT_TOKEN}
                chat_id: ${TELEGRAM_CHAT_ID}
                parse_mode: HTML
        route:
          receiver: telegram
          group_by: ["alertname", "cluster", "service"]
          group_wait: 10s
          group_interval: 10s
          repeat_interval: 12h
          routes:
            - matchers:
                - severity=~"warning|critical"
              receiver: telegram
    kubeStateMetrics:
      enabled: true
    nodeExporter:
      enabled: true
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
