---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-prometheus-stack-rules
spec:
  groups:
    - name: kubernetes.rules
      interval: 30s
      rules:
        # Node Health
        - alert: NodeMemoryUsageHigh
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on {{ $labels.node }}"
            description: "Node {{ $labels.node }} is using {{ $value | humanizePercentage }} of memory"

        - alert: NodeCPUUsageHigh
          expr: (1 - avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m]))) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} is using {{ $value | humanizePercentage }} CPU"

        - alert: NodeDiskUsageHigh
          expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lowerdir|squashfs|vfat"} / node_filesystem_size_bytes)) > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High disk usage on {{ $labels.node }}"
            description: "Disk {{ $labels.device }} on {{ $labels.node }} is {{ $value | humanizePercentage }} full"

        - alert: NodeDiskAlmostFull
          expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lowerdir|squashfs|vfat"} / node_filesystem_size_bytes)) > 0.90
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Critical disk usage on {{ $labels.node }}"
            description: "Disk {{ $labels.device }} on {{ $labels.node }} is {{ $value | humanizePercentage }} full"

        # Pod Health
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in the last 5 minutes"

        - alert: PodNotReady
          expr: min by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown"}) == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in {{ $labels.phase }} state for more than 5 minutes"

        # Persistent Volumes
        - alert: PersistentVolumeUsageHigh
          expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High PV usage on {{ $labels.persistentvolumeclaim }}"
            description: "PV {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is {{ $value | humanizePercentage }} full"

        - alert: PersistentVolumeAlmostFull
          expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.90
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Critical PV usage on {{ $labels.persistentvolumeclaim }}"
            description: "PV {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is {{ $value | humanizePercentage }} full"

    - name: prometheus.rules
      interval: 30s
      rules:
        # Prometheus itself
        - alert: PrometheusDown
          expr: up{job="prometheus"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Prometheus is down"
            description: "Prometheus instance {{ $labels.instance }} is down"

        - alert: PrometheusHighMemory
          expr: (process_resident_memory_bytes{job="prometheus"} / 1024 / 1024 / 1024) > 1.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus high memory usage"
            description: "Prometheus is using {{ $value | humanize }}GB of memory"

        - alert: PrometheusTargetDown
          expr: count by (job) (up{job!~"prometheus|alertmanager"} == 0) / count by (job) (up{job!~"prometheus|alertmanager"}) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus targets down: {{ $labels.job }}"
            description: "{{ $value | humanizePercentage }} of {{ $labels.job }} targets are down"

        # Alertmanager
        - alert: AlertmanagerDown
          expr: up{job="alertmanager"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Alertmanager is down"
            description: "Alertmanager instance {{ $labels.instance }} is down"
