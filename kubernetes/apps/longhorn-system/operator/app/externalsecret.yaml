---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: longhorn
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: longhorn-system-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        AWS_ENDPOINTS: "{{ index . \"S3-ENDPOINT\" }}"
        AWS_ACCESS_KEY_ID: "{{ index . \"K8S-LONGHORN-API-KEY\" }}"
        AWS_SECRET_ACCESS_KEY: "{{ index . \"K8S-LONGHORN-API-SECRET\" }}"
  dataFrom:
    - extract:
        key: intercolo
