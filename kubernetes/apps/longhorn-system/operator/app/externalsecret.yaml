---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: longhorn
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: longhorn-system-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        AWS_ENDPOINTS: "{{ .S3_ENDPOINT }}"
        AWS_ACCESS_KEY_ID: "{{ .K8S_LONGHORN_API_KEY }}"
        AWS_SECRET_ACCESS_KEY: "{{ .K8S_LONGHORN_API_SECRET }}"
  dataFrom:
    - extract:
        key: intercolo
