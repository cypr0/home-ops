---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app whiteboard
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      whiteboard:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/nextcloud-releases/whiteboard
              tag: v1.5.0@sha256:b5c90781b9926fd949c47f8babf5b27e2f7406fe34f25da08c757fb00f5563b3
            env:
              - name: NEXTCLOUD_URL
                value: "https://cloud.${SECRET_DOMAIN}"
              - name: JWT_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: nextcloud-secret
                    key: WHITEBOARD_JWT_SECRET_KEY
              - name: STORAGE_STRATEGY
                value: "redis"
              - name: REDIS_URL
                value: "redis://:${DRAGONFLY_PASSWORD}@dragonfly.database.svc.cluster.local:6379/9"
            securityContext:
              runAsUser: 65534
              runAsGroup: 65534
              fsGroup: 65534
    service:
      app:
        controller: *app
        ports:
          http:
            port: 3002
