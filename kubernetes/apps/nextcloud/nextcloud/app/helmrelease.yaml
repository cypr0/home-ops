---
# yaml-language-server: $schema=https://kubernetes-schemas.18b.haus/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  chart:
    spec:
      chart: nextcloud
      version: 8.9.1
      sourceRef:
        kind: HelmRepository
        name: nextcloud
  interval: 2h
  install:
    timeout: 60m
  upgrade:
    timeout: 60m
  values:
    deploymentAnnotations:
      secret.reloader.stakater.com/reload: nextcloud
    image:
      registry: public.ecr.aws
      repository: docker/library/nextcloud
      flavor: fpm-alpine
      tag: 32.0.6
    phpClientHttpsFix:
      enabled: true
    nextcloud:
      extraInitContainers:
        - name: fix-data-permissions
          image: busybox:1.37.0-uclibc
          command:
            - sh
            - -c
            - |
              echo "Fixing Nextcloud permissions..."
              chown -R 82:82 /var/www/html/data
              chmod -R 750 /var/www/html/data
              echo "Done!"
          volumeMounts:
            - name: nextcloud-data
              mountPath: /var/www/html/data
      host: cloud.${SECRET_DOMAIN}
      securityContext:
        runAsUser: 82
        runAsGroup: 82
        runAsNonRoot: true
        readOnlyRootFilesystem: false
        fsGroup: 82
        fsGroupChangePolicy: OnRootMismatch
      extraEnv:
        - name: NEXTCLOUD_REDIS_HOST
          value: dragonfly.database.svc.cluster.local
        - name: NEXTCLOUD_REDIS_DATABASE
          value: "2"
        - name: NEXTCLOUD_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: &secret nextcloud-secret
              key: REDIS_PASSWORD
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: *secret
              key: OIDC_CLIENT_ID
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: *secret
              key: OIDC_CLIENT_SECRET
      existingSecret:
        enabled: true
        secretName: *secret
        usernameKey: ADMIN_USER
        passwordKey: ADMIN_PASS
        smtpHostKey: SMTP_HOST
        smtpUsernameKey: SMTP_USERNAME
        smtpPasswordKey: SMTP_PASSWORD
        tokenKey: TOKEN
      mail:
        enabled: true
        fromAddress: "Nextcloud <mail@${SECRET_DOMAIN}>"
        domain: ${SECRET_DOMAIN}
        smtp:
          port: 25
          secure: ''
      defaultConfigs:
        redis.config.php: false
      configs:
        local.config.php: |-
          <?php
          $CONFIG = array(
                'backgroundjobs_mode' => 'cron',
                'activity_expire_days' => 14,
                'allow_local_remote_servers' => true,
                'auth.bruteforce.protection.enabled' => true,
                'overwriteprotocol' => 'https',
                'overwrite.cli.url' => 'https://cloud.${SECRET_DOMAIN}',
                'trusted_domains' => array(
                    0 => 'localhost',
                    1 => 'cloud.${SECRET_DOMAIN}',
                    2 => 'id.${SECRET_DOMAIN}',
                    3 => 'collabora.nextcloud.svc.cluster.local',
                ),
                'trusted_proxies' => array(
                    0 => '127.0.0.1',
                    1 => '10.0.0.0/8',
                    2 => '172.16.0.0/12',
                    3 => '192.168.0.0/16',
                ),
                'forwarded_for_headers' => array(
                  0 => 'HTTP_X_FORWARDED_FOR',
                ),

                'forbidden_filenames' =>
                  array (
                    0 => '.htaccess',
                    1 => 'Thumbs.db',
                    2 => 'thumbs.db',
                    ),

                'appstoreenabled' => true,
                'knowledgebaseenabled' => false,
                'quota_include_external_storage' => false,
                'share_folder' => '/Freigaben',
                'skeletondirectory' => '',
                'trashbin_retention_obligation' => 'auto, 7',

                'log_type' => 'file',
                'logfile' => '/var/log/nextcloud.log',
                'loglevel' => 0,

                'memcache.local' => '\OC\Memcache\APCu',
                'memcache.distributed' => '\OC\Memcache\Redis',
                'memcache.locking' => '\OC\Memcache\Redis',
                'redis' => array(
                  'host' => getenv('NEXTCLOUD_REDIS_HOST'),
                  'port' => getenv('NEXTCLOUD_REDIS_PORT') ?: 6379,
                  'password' => getenv('NEXTCLOUD_REDIS_PASSWORD'),
                  'dbindex'       => 8,
                  'timeout'       => 1.5,
                  'read_timeout'  => 1.5,
                ),

                'apps_paths' => array(
                    0 => array (
                            'path'     => OC::$SERVERROOT.'/apps',
                            'url'      => '/apps',
                            'writable' => false,
                    ),
                    1 => array (
                            'path'     => OC::$SERVERROOT.'/custom_apps',
                            'url'      => '/custom_apps',
                            'writable' => true,
                    ),
                ),

                'htaccess.RewriteBase' => '/',

                'mail_smtpmode' => 'smtp',
                'mail_smtptimeout' => 30,
                'mail_sendmailmode' => 'smtp',
                'mail_smtphost' => getenv('SMTP_HOST'),
                'mail_smtpport' => 25,
                'mail_smtpsecure' => '',
                'mail_smtpauth' => false,
                'mail_smtpauthtype' => '',
                'mail_smtppassword' => getenv('SMTP_PASSWORD'),
                'mail_smtpname' => getenv('SMTP_NAME'),
                'mail_from_address' => getenv('MAIL_FROM_ADDRESS'),
                'mail_domain' => getenv('MAIL_DOMAIN'),
                "mail_smtptimeout"  => 30,
                'mail_smtpstreamoptions' => array (
                  'ssl' => array (
                    'allow_self_signed' => true,
                    'verify_peer' => false,
                    'verify_peer_name' => false
                    ),
                  ),

                'enable_previews' => true,
                'enabledPreviewProviders' =>
                    array (
                  0 => 'OC\\Preview\\PNG',
                  1 => 'OC\\Preview\\JPEG',
                  2 => 'OC\\Preview\\GIF',
                  3 => 'OC\\Preview\\BMP',
                  4 => 'OC\\Preview\\XBitmap',
                  5 => 'OC\\Preview\\Movie',
                  6 => 'OC\\Preview\\PDF',
                  7 => 'OC\\Preview\\MP3',
                  8 => 'OC\\Preview\\TXT',
                  9 => 'OC\\Preview\\MarkDown',
                  10 => 'OC\\Preview\\HEIC',
                  11 => 'OC\\Preview\\MKV',
                  12 => 'OC\\Preview\\MP4',
                  13 => 'OC\\Preview\\AVI',
                  ),
                'preview_max_x' => 1024,
                'preview_max_y' => 768,
                'preview_max_scale_factor' => 1,

                  // Circumvention for client freezes - https://github.com/nextcloud/desktop/issues/5094
                'bulkupload.enabled' => false,

                'backgroundjobs_mode' => 'webcron',
                'default_language' => 'de',
                'default_locale' => 'de_DE',
                'default_phone_region' => 'DE',
                'default_timezone' => 'Europe/Berlin',
                'maintenance_window_start' => 1,

              );
        redis.config.php: |-
          <?php
          $CONFIG = array(
            'memcache.distributed' => '\OC\Memcache\Redis',
            'memcache.locking' => '\OC\Memcache\Redis',
            'redis' => array(
              'host' => getenv('NEXTCLOUD_REDIS_HOST'),
              'port' => getenv('NEXTCLOUD_REDIS_PORT') ?: 6379,
              'dbindex' => getenv('NEXTCLOUD_REDIS_DATABASE') ?: 0,
              'password' => getenv('NEXTCLOUD_REDIS_PASSWORD'),
            ),
          );
      phpConfigs:
        uploadLimit.ini: |
          upload_max_filesize = 16G
          post_max_size = 16G
          max_input_time = 3600
          max_execution_time = 3600
    persistence:
      enabled: true
      existingClaim: nextcloud-pvc
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data-pvc
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 2Gi
    startupProbe:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 360
      successThreshold: 1
    livenessProbe:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    readinessProbe:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    nginx:
      enabled: true
      image:
        repository: public.ecr.aws/nginx/nginx-unprivileged
      config:
        default: true
      securityContext:
        runAsUser: 82
        runAsGroup: 82
        runAsNonRoot: true
        readOnlyRootFilesystem: false
        fsGroup: 82
        fsGroupChangePolicy: OnRootMismatch
      resources:
        requests:
          cpu: 50m
          memory: 20Mi
        limits:
          memory: 100Mi
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: *secret
        databaseKey: POSTGRES_DB
        hostKey: POSTGRES_HOST
        passwordKey: POSTGRES_PASSWORD
        usernameKey: POSTGRES_USER
    redis:
      enabled: false
    metrics:
      enabled: false
      https: true
      serviceMonitor:
        enabled: false
    cronjob:
      enabled: true
      sidecar:
        securityContext:
          runAsGroup: 82
