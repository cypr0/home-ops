apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-data-pvc
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn-standard
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-pvc
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn-basic
  resources:
    requests:
      storage: 25Gi
