        image: public.ecr.aws/docker/library/nextcloud:32.0.6-fpm-alpine
        command: ["/bin/sh", "-ec"]
        args:
        - |
          set -eu
          REDIS_HOST="dragonfly.database.svc.cluster.local"
          REDIS_PORT="6379"
          REDIS_DB="2"
          LOCK_KEY="nextcloud:config:job:lock"
          JOB_MARKER="/var/www/html/config/.nextcloud-richdocuments-done"

          # Idempotency check
          if [ -f "$JOB_MARKER" ]; then
            echo "Richdocuments configuration already completed, skipping"
            exit 0
          fi

          trap 'redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" -a "$NEXTCLOUD_REDIS_PASSWORD" -n "$REDIS_DB" DEL "$LOCK_KEY" 2>/dev/null || true; echo "Lock released"' EXIT

          timeout=7200

          wait_installed_and_ready() {
            elapsed=0
            until php /var/www/html/occ status --output json | grep -q '"installed":true'; do
              echo "Waiting for Nextcloud installation..."
              sleep 10
              elapsed=$((elapsed + 10))
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "Timed out waiting for Nextcloud installation"
                exit 1
              fi
            done

            elapsed=0
            until php /var/www/html/occ status --output json | grep -q '"maintenance":false'; do
              echo "Waiting for maintenance mode to be disabled..."
              sleep 10
              elapsed=$((elapsed + 10))
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "Timed out waiting for maintenance mode to be disabled"
                exit 1
              fi
            done
          }

          wait_installed_and_ready

          elapsed=0
          until php /var/www/html/occ app:list | sed -n '/Enabled:/,/Disabled:/p' | grep -q -- '- richdocuments:'; do
            echo "Waiting for richdocuments app to be enabled..."
            sleep 10
            elapsed=$((elapsed + 10))
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "Timed out waiting for richdocuments app"
              exit 1
            fi
          done

          echo "Configuring richdocuments..."
          php /var/www/html/occ config:app:set --value https://office.${SECRET_DOMAIN} richdocuments wopi_url
          php /var/www/html/occ config:app:set --value "10.69.0.0/16" richdocuments wopi_allowlist
          php /var/www/html/occ richdocuments:activate-config
          echo "Richdocuments configuration completed."

          touch "$JOB_MARKER"
          echo "Richdocuments configuration completed, marker file created"
        volumeMounts:
        - name: app-main
          mountPath: /var/www
          subPath: root
        - name: app-main
          mountPath: /var/www/html
          subPath: html
        - name: app-main
          mountPath: /var/www/html/config
          subPath: config
        - name: app-main
          mountPath: /var/www/html/custom_apps
          subPath: custom_apps
        - name: data
          mountPath: /var/www/html/data
          subPath: data
      restartPolicy: OnFailure
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: nextcloud-data-pvc
      - name: app-main
        persistentVolumeClaim:
          claimName: nextcloud-pvc
