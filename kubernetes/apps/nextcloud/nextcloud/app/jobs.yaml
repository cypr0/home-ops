  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  activeDeadlineSeconds: 10800
  template:
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: nextcloud
                app.kubernetes.io/component: app
            topologyKey: kubernetes.io/hostname
      securityContext:
        runAsUser: 82
        runAsGroup: 82
        fsGroup: 82
      initContainers:
      - name: wait-for-addapps
        image: public.ecr.aws/docker/library/busybox:1.36
        command: ['sh', '-c']
        args:
        - |
          MARKER="/var/www/html/config/.nextcloud-addapps-done"
          TIMEOUT=3600
          elapsed=0
          until [ -f "$MARKER" ]; do
            echo "Waiting for addapps to complete..."
            sleep 10
            elapsed=$((elapsed + 10))
            if [ "$elapsed" -ge "$TIMEOUT" ]; then
              echo "Timed out waiting for addapps marker"
              exit 1
            fi
          done
          echo "Addapps marker found, proceeding"
        volumeMounts:
        - name: app-main
          mountPath: /var/www/html/config
          subPath: config
      - name: wait-for-redis-lock
        image: public.ecr.aws/docker/library/redis:7.2-alpine
        command: ['sh', '-c']
        args:
        - |
          set -eu
          REDIS_HOST="dragonfly.database.svc.cluster.local"
          REDIS_PORT="6379"
          REDIS_DB="2"
          LOCK_KEY="nextcloud:config:job:lock"
          LOCK_VALUE="job-$$-$(date +%s)"
          TIMEOUT=3600
          LOCK_TTL=1800
          elapsed=0

          # Wait for Redis to be ready
          until redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" -a "$NEXTCLOUD_REDIS_PASSWORD" -n "$REDIS_DB" ping >/dev/null 2>&1; do
            echo "Waiting for Redis..."
            sleep 2
            elapsed=$((elapsed + 2))
            if [ "$elapsed" -ge 60 ]; then
              echo "Redis not responding after 60 seconds"
              exit 1
            fi
          done

          elapsed=0
          # Try to acquire lock with exponential backoff
          while true; do
            # Try to acquire lock (only succeeds if key doesn't exist)
            LOCK_ACQUIRED=$(redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" -a "$NEXTCLOUD_REDIS_PASSWORD" -n "$REDIS_DB" \
              SET "$LOCK_KEY" "$LOCK_VALUE" EX "$LOCK_TTL" NX)

            if [ "$LOCK_ACQUIRED" = "OK" ]; then
              echo "Lock acquired by $$ at $(date)"
              break
            fi

            # Lock exists, wait before retrying
            WAIT_TIME=$((5 + (elapsed / 300)))
            [ "$WAIT_TIME" -gt 30 ] && WAIT_TIME=30
            echo "Lock held by another job, waiting ${WAIT_TIME}s..."
            sleep "$WAIT_TIME"
            elapsed=$((elapsed + WAIT_TIME))

            if [ "$elapsed" -ge "$TIMEOUT" ]; then
              echo "Lock timeout waiting for other jobs after ${elapsed}s"
              exit 1
            fi
          done
        env:
        - name: NEXTCLOUD_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-secret
              key: REDIS_PASSWORD
      containers:
      - name: nextcloud-job-config-ai
        image: public.ecr.aws/docker/library/nextcloud:32.0.6-fpm-alpine
        command: ["/bin/sh", "-ec"]
        args:
        - |
          set -eu
          REDIS_HOST="dragonfly.database.svc.cluster.local"
          REDIS_PORT="6379"
          REDIS_DB="2"
          LOCK_KEY="nextcloud:config:job:lock"
          JOB_MARKER="/var/www/html/config/.nextcloud-ai-done"

          # Idempotency check
          if [ -f "$JOB_MARKER" ]; then
            echo "AI configuration already completed, skipping"
            exit 0
          fi

          trap 'redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" -a "$NEXTCLOUD_REDIS_PASSWORD" -n "$REDIS_DB" DEL "$LOCK_KEY" 2>/dev/null || true; echo "Lock released"' EXIT

          timeout=7200

          wait_installed_and_ready() {
            elapsed=0
            until php /var/www/html/occ status --output json | grep -q '"installed":true'; do
              echo "Waiting for Nextcloud installation..."
              sleep 10
              elapsed=$((elapsed + 10))
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "Timed out waiting for Nextcloud installation"
                exit 1
              fi
            done

            elapsed=0
            until php /var/www/html/occ status --output json | grep -q '"maintenance":false'; do
              echo "Waiting for maintenance mode to be disabled..."
              sleep 10
              elapsed=$((elapsed + 10))
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "Timed out waiting for maintenance mode to be disabled"
                exit 1
              fi
            done
          }

          is_installed() {
            php /var/www/html/occ app:list | grep -q -- "- $1:"
          }

          is_enabled() {
            php /var/www/html/occ app:list | sed -n '/Enabled:/,/Disabled:/p' | grep -q -- "- $1:"
          }

          ensure_app_enabled() {
            app="$1"
            elapsed=0
            while true; do
              wait_installed_and_ready

              if ! is_installed "$app"; then
                echo "Installing ${app} app..."
                php /var/www/html/occ app:install "$app" --no-interaction || true
              fi

              if ! is_enabled "$app"; then
                echo "Enabling ${app} app..."
                php /var/www/html/occ app:enable "$app" --no-interaction || true
              fi

              if is_enabled "$app"; then
                break
              fi

              echo "Waiting for ${app} app to be enabled..."
              sleep 10
              elapsed=$((elapsed + 10))
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "Timed out waiting for ${app} app"
                exit 1
              fi
            done
          }

          set_if_non_empty() {
            key="$1"
            value="$2"
            if [ -n "$value" ]; then
              php /var/www/html/occ config:app:set integration_openai "$key" --value="$value"
            fi
          }

          wait_installed_and_ready
          ensure_app_enabled integration_openai
          ensure_app_enabled assistant

          echo "Configuring integration_openai..."
          set_if_non_empty url "https://gpt.${SECRET_DOMAIN}/api/v1"
          set_if_non_empty service_name "Open WebUI"
          set_if_non_empty api_key "${OPENWEBUI_NEXTCLOUD_API_KEY}"

          set_if_non_empty default_completion_model_id "openai/gpt-5.2-chat"

          echo "AI configuration completed."

          touch "$JOB_MARKER"
          echo "AI configuration completed, marker file created"
        volumeMounts:
        - name: app-main
          mountPath: /var/www
          subPath: root
        - name: app-main
          mountPath: /var/www/html
          subPath: html
        - name: app-main
          mountPath: /var/www/html/config
          subPath: config
        - name: app-main
          mountPath: /var/www/html/custom_apps
          subPath: custom_apps
        - name: data
          mountPath: /var/www/html/data
          subPath: data
      restartPolicy: OnFailure
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: nextcloud-data-pvc
      - name: app-main
        persistentVolumeClaim:
          claimName: nextcloud-pvc
