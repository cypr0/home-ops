apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-job-config-postinstall-v4
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  activeDeadlineSeconds: 7200
  template:
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: nextcloud
                app.kubernetes.io/component: app
            topologyKey: kubernetes.io/hostname
      securityContext:
        runAsUser: 82
        runAsGroup: 82
        fsGroup: 82
      initContainers:
      - name: wait-for-redis-lock-v01
        image: public.ecr.aws/docker/library/redis:7.2-alpine
        command: ['sh', '-c']
        args:
        - |
          set -eu
          REDIS_HOST="dragonfly.database.svc.cluster.local"
          REDIS_PORT="6379"
          REDIS_DB="2"
          LOCK_KEY="nextcloud:config:job:lock"
          LOCK_VALUE="job-$$-$(date +%s)"
          TIMEOUT=3600
          LOCK_TTL=1800
          elapsed=0

          # Wait for Redis to be ready
          until redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" -a "$NEXTCLOUD_REDIS_PASSWORD" -n "$REDIS_DB" ping >/dev/null 2>&1; do
            echo "Waiting for Redis..."
            sleep 2
            elapsed=$((elapsed + 2))
            if [ "$elapsed" -ge 60 ]; then
              echo "Redis not responding after 60 seconds"
              exit 1
            fi
          done

          elapsed=0
          # Try to acquire lock with exponential backoff
          while true; do
            # Try to acquire lock (only succeeds if key doesn't exist)
            LOCK_ACQUIRED=$(redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" -a "$NEXTCLOUD_REDIS_PASSWORD" -n "$REDIS_DB" \
              SET "$LOCK_KEY" "$LOCK_VALUE" EX "$LOCK_TTL" NX)

            if [ "$LOCK_ACQUIRED" = "OK" ]; then
              echo "Lock acquired by $$ at $(date)"
              break
            fi

            # Lock exists, wait before retrying
            WAIT_TIME=$((5 + (elapsed / 300)))
            [ "$WAIT_TIME" -gt 30 ] && WAIT_TIME=30
            echo "Lock held by another job, waiting ${WAIT_TIME}s..."
            sleep "$WAIT_TIME"
            elapsed=$((elapsed + WAIT_TIME))

            if [ "$elapsed" -ge "$TIMEOUT" ]; then
              echo "Lock timeout waiting for other jobs after ${elapsed}s"
              exit 1
            fi
          done
        env:
        - name: NEXTCLOUD_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-secret
              key: REDIS_PASSWORD
      containers:
      - name: nextcloud-job-config-postinstall-v01
        image: public.ecr.aws/docker/library/nextcloud:32.0.6-fpm-alpine
        command: ["/bin/sh", "-ec"]
        args:
        - |
          set -eu
          REDIS_HOST="dragonfly.database.svc.cluster.local"
          REDIS_PORT="6379"
          REDIS_DB="2"
          LOCK_KEY="nextcloud:config:job:lock"
          JOB_MARKER="/var/www/html/config/.nextcloud-postinstall-done"

          # Idempotency check
          if [ -f "$JOB_MARKER" ]; then
            echo "Setup already completed, skipping"
            exit 0
          fi

          trap 'redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" -a "$NEXTCLOUD_REDIS_PASSWORD" -n "$REDIS_DB" DEL "$LOCK_KEY" 2>/dev/null || true; echo "Lock released"' EXIT

          timeout=1800

          wait_installed_and_ready() {
            elapsed=0
            until php /var/www/html/occ status --output json | grep -q '"installed":true'; do
              sleep 10
              elapsed=$((elapsed + 10))
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "Timed out waiting for Nextcloud to report installed=true"
                exit 1
              fi
            done

            elapsed=0
            until php /var/www/html/occ status --output json | grep -q '"maintenance":false'; do
              echo "Waiting for maintenance mode to be disabled..."
              sleep 10
              elapsed=$((elapsed + 10))
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "Timed out waiting for maintenance mode to be disabled"
                exit 1
              fi
            done
          }

          wait_installed_and_ready

          php /var/www/html/occ upgrade --no-interaction
          wait_installed_and_ready

          php /var/www/html/occ db:add-missing-indices --no-interaction
          php /var/www/html/occ db:add-missing-columns --no-interaction
          php /var/www/html/occ db:add-missing-primary-keys --no-interaction
          php /var/www/html/occ db:convert-filecache-bigint --no-interaction
          php /var/www/html/occ maintenance:repair --include-expensive --no-interaction

          touch "$JOB_MARKER"
          echo "Setup completed, marker file created"
        volumeMounts:
        - name: app-main
          mountPath: /var/www
          subPath: root
        - name: app-main
          mountPath: /var/www/html
          subPath: html
        - name: app-main
          mountPath: /var/www/html/config
          subPath: config
        - name: app-main
          mountPath: /var/www/html/custom_apps
          subPath: custom_apps
        - name: data
          mountPath: /var/www/html/data
          subPath: data
      restartPolicy: OnFailure
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: nextcloud-data-pvc
      - name: app-main
        persistentVolumeClaim:
          claimName: nextcloud-pvc
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-cronjob-ai-worker-v01
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 30
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 60
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        spec:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: nextcloud
                    app.kubernetes.io/component: app
                topologyKey: kubernetes.io/hostname
          securityContext:
            runAsUser: 82
            runAsGroup: 82
            fsGroup: 82
          containers:
          - name: nextcloud-cronjob-ai-worker
            image: public.ecr.aws/docker/library/nextcloud:32.0.6-fpm-alpine
            command: ["/bin/sh", "-ec"]
            args:
            - |
              set -eu
              CONFIG_DIR="/var/www/html/config"
              timeout=300

              # Wait for all config jobs to complete
              elapsed=0
              max_wait=3600
              markers=".nextcloud-oidc-done .nextcloud-richdocuments-done .nextcloud-ai-done .nextcloud-whiteboard-done"

              while [ "$elapsed" -lt "$max_wait" ]; do
                all_done=true
                for marker in $markers; do
                  if [ ! -f "$CONFIG_DIR/$marker" ]; then
                    all_done=false
                    break
                  fi
                done

                if [ "$all_done" = "true" ]; then
                  break
                fi

                echo "Waiting for config jobs to complete..."
                sleep 10
                elapsed=$((elapsed + 10))
              done

              if [ "$all_done" != "true" ]; then
                echo "Config jobs did not complete within timeout, aborting"
                exit 1
              fi

              wait_installed_and_ready() {
                elapsed=0
                until php /var/www/html/occ status --output json | grep -q '"installed":true'; do
                  echo "Waiting for Nextcloud installation..."
                  sleep 10
                  elapsed=$((elapsed + 10))
                  if [ "$elapsed" -ge "$timeout" ]; then
                    echo "Timed out waiting for Nextcloud installation"
                    exit 1
                  fi
                done

                elapsed=0
                until php /var/www/html/occ status --output json | grep -q '"maintenance":false'; do
                  echo "Waiting for maintenance mode to be disabled..."
                  sleep 10
                  elapsed=$((elapsed + 10))
                  if [ "$elapsed" -ge "$timeout" ]; then
                    echo "Timed out waiting for maintenance mode to be disabled"
                    exit 1
                  fi
                done
              }

              wait_installed_and_ready

              php /var/www/html/occ background-job:worker -v -t 55 'OC\TaskProcessing\SynchronousBackgroundJob'
            volumeMounts:
            - name: app-main
              mountPath: /var/www
              subPath: root
            - name: app-main
              mountPath: /var/www/html
              subPath: html
            - name: app-main
              mountPath: /var/www/html/config
              subPath: config
            - name: app-main
              mountPath: /var/www/html/custom_apps
              subPath: custom_apps
            - name: data
              mountPath: /var/www/html/data
              subPath: data
            env:
            - name: NEXTCLOUD_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secret
                  key: REDIS_PASSWORD
          restartPolicy: OnFailure
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: nextcloud-data-pvc
          - name: app-main
            persistentVolumeClaim:
              claimName: nextcloud-pvc
---
