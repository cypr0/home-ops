            echo "Waiting for user_oidc app to be installed..."
            sleep 10
            elapsed=$((elapsed + 10))
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "Timed out waiting for user_oidc app"
              exit 1
            fi
