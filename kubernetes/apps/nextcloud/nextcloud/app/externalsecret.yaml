---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: nextcloud-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        REDIS_PASSWORD: "{{ .DRAGONFLY_PASSWORD }}"
        OIDC_CLIENT_ID: "{{ .NEXTCLOUD_OIDC_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .NEXTCLOUD_OIDC_CLIENT_SECRET }}"
        ADMIN_USER: "{{ .NEXTCLOUD_ADMIN_USERNAME }}"
        ADMIN_PASS: "{{ .NEXTCLOUD_ADMIN_PASSWORD }}"
        SMTP_HOST: "${SECRET_MAIL_SERVER}"
        SMTP_USERNAME: ""
        SMTP_PASSWORD: ""
        TOKEN: "{{ .NEXTCLOUD_TOKEN }}"
        POSTGRES_DB: "{{ .NEXTCLOUD_POSTGRESQL_DB_NAME}}"
        POSTGRES_HOST: "postgres-rw.database.svc.cluster.local"
        POSTGRES_PASSWORD: "{{ .NEXTCLOUD_POSTGRESQL_PASSWORD }}"
        POSTGRES_USER: "{{ .NEXTCLOUD_POSTGRESQL_USERNAME }}"

  dataFrom:
    - extract:
        key: dragonfly
    - extract:
        key: nextcloud
