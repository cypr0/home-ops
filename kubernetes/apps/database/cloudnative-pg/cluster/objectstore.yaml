---
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: k8s-postgres
  namespace: database
spec:
  configuration:
    destinationPath: s3://k8s-postgres
    endpointURL: https://de-fra.i3storage.com
    s3Credentials:
      accessKeyId:
        name: cloudnative-pg-secret
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: cloudnative-pg-secret
        key: AWS_SECRET_ACCESS_KEY
    wal:
      compression: zstd
      maxParallel: 8
    data:
      compression: gzip
      immediateCheckpoint: false
      jobs: 4
  retentionPolicy: 14d
