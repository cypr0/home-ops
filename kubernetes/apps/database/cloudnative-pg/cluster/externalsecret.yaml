---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudnative-pg
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cloudnative-pg-secret
    template:
      engineVersion: v2
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "{{ .POSTGRES_SUPER_USER }}"
        password: "{{ .POSTGRES_SUPER_PASS }}"
        AWS_ACCESS_KEY_ID: "{{ .K8S_POSTGRES_API_KEY }}"
        AWS_SECRET_ACCESS_KEY: "{{ .K8S_POSTGRES_API_SECRET }}"
        AWS_REGION: "{{ .S3_REGION }}"

  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: intercolo
