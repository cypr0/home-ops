---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app trivy-operator
spec:
  interval: 1h
  chartRef:
    kind: HelmChart
    name: *app
    namespace: flux-system
  chart:
    spec:
      chart: trivy-operator
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: *app
        namespace: security
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      registry: ghcr.io
      repository: aquasecurity/trivy-operator
      tag: 0.22.0
    operator:
      webhooks:
        admission:
          enabled: true
      logLevel: info
    trivy:
      image:
        registry: ghcr.io
        repository: aquasecurity/trivy
        tag: 0.52.0
      severity: "HIGH,CRITICAL"
      scanJobCompletionDeadlineSeconds: 300
    scanJob:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
    vulnerability:
      scanners:
        - trivy
      scanOnlyCurrentRevisions: true
    compliance:
      enabled: false
    rbac:
      create: true
    serviceAccount:
      create: true
      name: *app
